name: keep-warm

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping backend health
        run: |
          curl -fsS -o /dev/null -w "status=%{http_code} ttfb=%{time_starttransfer}s\n" \
            https://dwallet-5mw9.onrender.com/api/health
